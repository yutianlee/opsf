name: publish-pypi

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref or tag to publish"
        required: true
        default: "v0.2.0-alpha.1"

  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref }}
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check release tag matches package version
        env:
          RELEASE_REF: ${{ github.event.release.tag_name || inputs.ref || github.ref_name }}
        run: python scripts/check_release_version.py "$RELEASE_REF"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    name: Publish distribution to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/certsf

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
