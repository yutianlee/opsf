name: publish-testpypi

# Manual staging only. Do not add release triggers; real PyPI prereleases are
# published by publish-pypi from GitHub prerelease events.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref or tag to publish"
        required: true
        default: "v0.3.0"
      confirm:
        description: "Type publish-testpypi to confirm"
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Confirm manual TestPyPI staging
        run: |
          if [ "${{ inputs.confirm }}" != "publish-testpypi" ]; then
            echo "Refusing to publish to TestPyPI without confirm=publish-testpypi."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check release tag matches package version
        run: python scripts/check_release_version.py "${{ inputs.ref }}"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    name: Publish distribution to TestPyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/certsf

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
