name: pypi-smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Published certsf version to test"
        required: true
        default: "0.3.0"
  schedule:
    - cron: "0 3 * * 1"

jobs:
  smoke:
    name: pypi-smoke / ${{ matrix.python-version }} ${{ matrix.extras || 'base' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        extras: ["", "[certified]"]

    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install from PyPI
        run: |
          python -m pip install --upgrade pip
          python -m pip install --pre "certsf${{ matrix.extras }}==${{ inputs.version || '0.3.0' }}"

      - name: Smoke test import and calls
        run: |
          python - <<'PY'
          import sysconfig
          from pathlib import Path

          import certsf
          from certsf import ai, besselj, beta, dawson, erf, erfc, erfcinv, erfcx, erfi, erfinv, gamma, gamma_ratio, loggamma, loggamma_ratio, pcfu, pochhammer, rgamma

          certsf_path = Path(certsf.__file__).resolve()
          install_paths = [
              Path(sysconfig.get_paths()[key]).resolve()
              for key in ("purelib", "platlib")
          ]
          assert any(certsf_path.is_relative_to(path) for path in install_paths), certsf_path

          print(certsf.__all__)
          print(certsf_path)
          print(gamma("3.2", mode="fast").to_mcp_dict())
          print(loggamma("3.2", mode="fast").to_mcp_dict())
          print(rgamma("3.2", mode="fast").to_mcp_dict())
          print(gamma_ratio("3.2", "1.2", mode="fast").to_mcp_dict())
          print(loggamma_ratio("3.2", "1.2", mode="fast").to_mcp_dict())
          print(beta("2", "3", mode="fast").to_mcp_dict())
          print(pochhammer("0.5", "3", mode="fast").to_mcp_dict())
          print(erf("1.0", mode="fast").to_mcp_dict())
          print(erfc("1.0", mode="fast").to_mcp_dict())
          print(erfcinv("0.5", mode="fast").to_mcp_dict())
          print(erfcx("1.0", mode="fast").to_mcp_dict())
          print(erfi("1.0", mode="fast").to_mcp_dict())
          print(erfinv("0.5", mode="fast").to_mcp_dict())
          print(dawson("1.0", mode="fast").to_mcp_dict())
          print(ai("1.0", mode="high_precision", dps=60).to_mcp_dict())
          print(besselj("2", "4.0", mode="fast").to_mcp_dict())
          print(pcfu("2.5", "1.25", mode="high_precision", dps=60).to_mcp_dict())
          PY

      - name: Certified smoke calls
        if: matrix.extras == '[certified]'
        run: |
          python - <<'PY'
          from certsf import ai, besselj, beta, dawson, erf, erfc, erfcinv, erfcx, erfi, erfinv, gamma, gamma_ratio, loggamma, loggamma_ratio, pcfu, pochhammer, rgamma

          cases = [
              gamma("3.2", mode="certified", dps=50),
              loggamma("3.2", mode="certified", dps=50),
              rgamma("0", mode="certified", dps=50),
              gamma_ratio("3.2", "1.2", mode="certified", dps=50),
              loggamma_ratio("3.2", "1.2", mode="certified", dps=50),
              beta("2", "3", mode="certified", dps=50),
              pochhammer("0.5", "3", mode="certified", dps=50),
              erf("1.0", mode="certified", dps=50),
              erfc("1.0", mode="certified", dps=50),
              erfcinv("0.5", mode="certified", dps=50),
              erfcx("1.0", mode="certified", dps=50),
              erfi("1.0", mode="certified", dps=50),
              erfinv("0.5", mode="certified", dps=50),
              dawson("1.0", mode="certified", dps=50),
              ai("1.0", mode="certified", dps=50),
              besselj("2", "4.0", mode="certified", dps=50),
              pcfu("2.5", "1.25", mode="certified", dps=50),
          ]

          for result in cases:
              print(result.to_mcp_dict())
              assert result.certified

          def assert_custom_loggamma(result, *, method, selected_method):
              payload = result.to_mcp_dict()
              print(payload)
              assert result.certified
              assert result.method == method
              assert result.diagnostics["certificate_scope"] == "stirling_loggamma_positive_real"
              assert result.diagnostics["selected_method"] == selected_method

          stirling_result = loggamma("50", mode="certified", method="stirling", dps=50)
          shifted_50_result = loggamma("20", mode="certified", method="stirling_shifted", dps=50)
          shifted_100_result = loggamma("20", mode="certified", method="stirling_shifted", dps=100)
          auto_50_result = loggamma("20", mode="certified", method="certified_auto", dps=50)
          auto_100_result = loggamma("20", mode="certified", method="certified_auto", dps=100)
          auto_arb_result = loggamma("3.2", mode="certified", method="certified_auto", dps=50)
          gamma_stirling_exp_result = gamma("20", mode="certified", method="stirling_exp", dps=50)
          gamma_stirling_exp_high_result = gamma("20", mode="certified", method="stirling_exp", dps=100)
          rgamma_stirling_recip_result = rgamma("20", mode="certified", method="stirling_recip", dps=50)
          rgamma_stirling_recip_high_result = rgamma("20", mode="certified", method="stirling_recip", dps=100)

          assert_custom_loggamma(
              stirling_result,
              method="stirling_loggamma",
              selected_method="stirling",
          )
          for result in (shifted_50_result, shifted_100_result):
              assert_custom_loggamma(
                  result,
                  method="stirling_shifted_loggamma",
                  selected_method="stirling_shifted",
              )
              for key in (
                  "shift",
                  "shifted_argument",
                  "shift_policy",
                  "guard_digits",
                  "effective_dps",
                  "coefficient_source",
                  "largest_bernoulli_used",
                  "tail_bound",
              ):
                  assert key in result.diagnostics

          def assert_auto_loggamma(result):
              payload = result.to_mcp_dict()
              print(payload)
              assert result.certified
              assert result.backend != "mpmath"
              assert result.diagnostics["auto_selector"] == "certified_auto"
              assert result.diagnostics["auto_selected_method"] in {"arb", "stirling", "stirling_shifted"}
              assert result.diagnostics["auto_reason"]
              assert isinstance(result.diagnostics["auto_candidates"], list)
              assert result.diagnostics["auto_candidates"]

          def assert_has_preselection_candidate(result):
              candidates = result.diagnostics["auto_candidates"]
              assert any(
                  all(
                      key in candidate
                      for key in ("preselected", "can_certify", "estimated_terms_used")
                  )
                  for candidate in candidates
              )

          for result in (auto_50_result, auto_100_result, auto_arb_result):
              assert_auto_loggamma(result)
          assert_has_preselection_candidate(auto_50_result)
          assert_has_preselection_candidate(auto_100_result)
          assert auto_50_result.diagnostics["auto_selected_method"] == "stirling"
          assert auto_100_result.diagnostics["auto_selected_method"] == "stirling_shifted"
          assert auto_arb_result.diagnostics["auto_selected_method"] == "arb"
          candidates = auto_100_result.diagnostics["auto_candidates"]
          assert candidates[0]["method"] == "stirling"
          assert candidates[0]["can_certify"] is False
          assert candidates[1]["method"] == "stirling_shifted"
          assert candidates[1]["can_certify"] is True
          assert candidates[1]["selected"] is True

          def assert_gamma_stirling_exp(result):
              payload = result.to_mcp_dict()
              print(payload)
              assert result.certified
              assert result.function == "gamma"
              assert result.method == "stirling_exp_gamma"
              assert result.backend == "certsf+python-flint"
              assert result.backend != "mpmath"
              assert result.diagnostics["selected_method"] == "stirling_exp"
              assert result.diagnostics["certificate_scope"] == "gamma_positive_real_stirling_exp"
              assert result.diagnostics["certificate_level"] == "custom_asymptotic_bound"
              assert result.diagnostics["audit_status"] == "theorem_documented"
              assert result.diagnostics["formula"] == "gamma=exp(loggamma)"
              assert result.diagnostics["loggamma_method_used"] in {"stirling", "stirling_shifted"}
              assert "loggamma_abs_error_bound" in result.diagnostics
              assert "exp_radius" in result.diagnostics
              assert "propagated_error_bound" in result.diagnostics

          for result in (gamma_stirling_exp_result, gamma_stirling_exp_high_result):
              assert_gamma_stirling_exp(result)
          assert gamma_stirling_exp_high_result.diagnostics["loggamma_method_used"] == "stirling_shifted"

          def assert_rgamma_stirling_recip(result):
              payload = result.to_mcp_dict()
              print(payload)
              assert result.certified
              assert result.function == "rgamma"
              assert result.method == "stirling_recip_rgamma"
              assert result.backend == "certsf+python-flint"
              assert result.diagnostics["selected_method"] == "stirling_recip"
              assert result.diagnostics["certificate_scope"] == "rgamma_positive_real_stirling_recip"
              assert result.diagnostics["certificate_level"] == "custom_asymptotic_bound"
              assert result.diagnostics["audit_status"] == "theorem_documented"
              assert result.diagnostics["loggamma_method_used"] in {"stirling", "stirling_shifted"}
              assert result.abs_error_bound is not None

          for result in (rgamma_stirling_recip_result, rgamma_stirling_recip_high_result):
              assert_rgamma_stirling_recip(result)
          PY

  mcp-smoke:
    name: pypi-smoke / ${{ matrix.python-version }} mcp-certified
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install MCP extra from PyPI
        run: |
          python -m pip install --upgrade pip
          python -m pip install --pre "certsf[mcp,certified]==${{ inputs.version || '0.3.0' }}"

      - name: MCP smoke test
        run: |
          python - <<'PY'
          import sysconfig
          from pathlib import Path

          import certsf
          from certsf.mcp_server import build_server, special_beta, special_dawson, special_erf, special_erfc, special_erfcinv, special_erfcx, special_erfi, special_erfinv, special_gamma, special_gamma_ratio, special_loggamma, special_loggamma_ratio, special_pochhammer, special_rgamma

          certsf_path = Path(certsf.__file__).resolve()
          install_paths = [
              Path(sysconfig.get_paths()[key]).resolve()
              for key in ("purelib", "platlib")
          ]
          assert any(certsf_path.is_relative_to(path) for path in install_paths), certsf_path

          result = special_gamma("3.2", mode="fast")
          loggamma_result = special_loggamma("3.2", mode="fast")
          rgamma_result = special_rgamma("3.2", mode="fast")
          ratio_result = special_gamma_ratio("3.2", "1.2", mode="fast")
          log_ratio_result = special_loggamma_ratio("3.2", "1.2", mode="fast")
          beta_result = special_beta("2", "3", mode="fast")
          pochhammer_result = special_pochhammer("0.5", "3", mode="fast")
          erf_result = special_erf("1.0", mode="certified", dps=50)
          erfc_result = special_erfc("1.0", mode="certified", dps=50)
          erfcinv_result = special_erfcinv("0.5", mode="certified", dps=50)
          erfcx_result = special_erfcx("1.0", mode="certified", dps=50)
          erfi_result = special_erfi("1.0", mode="certified", dps=50)
          erfinv_result = special_erfinv("0.5", mode="certified", dps=50)
          dawson_result = special_dawson("1.0", mode="certified", dps=50)
          stirling_result = special_loggamma("50", mode="certified", method="stirling", dps=50)
          shifted_result = special_loggamma("20", mode="certified", method="stirling_shifted", dps=50)
          auto_payload = special_loggamma("20", mode="certified", method="certified_auto", dps=100)
          gamma_stirling_payload = special_gamma("20", mode="certified", method="stirling_exp", dps=50)
          rgamma_stirling_payload = special_rgamma("20", mode="certified", method="stirling_recip", dps=50)
          rgamma_stirling_high_payload = special_rgamma("20", mode="certified", method="stirling_recip", dps=100)

          print(certsf_path)
          print(build_server)
          print(result)
          print(loggamma_result)
          print(rgamma_result)
          print(ratio_result)
          print(log_ratio_result)
          print(beta_result)
          print(pochhammer_result)
          print(erf_result)
          print(erfc_result)
          print(erfcinv_result)
          print(erfcx_result)
          print(erfi_result)
          print(erfinv_result)
          print(dawson_result)
          print(stirling_result)
          print(shifted_result)
          print(auto_payload)
          print(gamma_stirling_payload)
          print(rgamma_stirling_payload)
          print(rgamma_stirling_high_payload)
          assert callable(build_server)
          assert isinstance(result, dict)
          assert isinstance(loggamma_result, dict)
          assert isinstance(rgamma_result, dict)
          assert isinstance(ratio_result, dict)
          assert isinstance(log_ratio_result, dict)
          assert isinstance(beta_result, dict)
          assert isinstance(pochhammer_result, dict)
          assert isinstance(erf_result, dict)
          assert isinstance(erfc_result, dict)
          assert isinstance(erfcinv_result, dict)
          assert isinstance(erfcx_result, dict)
          assert isinstance(erfi_result, dict)
          assert isinstance(erfinv_result, dict)
          assert isinstance(dawson_result, dict)
          assert isinstance(stirling_result, dict)
          assert isinstance(shifted_result, dict)
          assert isinstance(auto_payload, dict)
          assert isinstance(gamma_stirling_payload, dict)
          assert isinstance(rgamma_stirling_payload, dict)
          assert isinstance(rgamma_stirling_high_payload, dict)
          assert result["function"] == "gamma"
          assert loggamma_result["function"] == "loggamma"
          assert rgamma_result["function"] == "rgamma"
          assert ratio_result["function"] == "gamma_ratio"
          assert log_ratio_result["function"] == "loggamma_ratio"
          assert beta_result["function"] == "beta"
          assert pochhammer_result["function"] == "pochhammer"
          assert erf_result["function"] == "erf"
          assert erfc_result["function"] == "erfc"
          assert erfcinv_result["function"] == "erfcinv"
          assert erfcx_result["function"] == "erfcx"
          assert erfi_result["function"] == "erfi"
          assert erfinv_result["function"] == "erfinv"
          assert dawson_result["function"] == "dawson"
          assert stirling_result["function"] == "loggamma"
          assert shifted_result["function"] == "loggamma"
          assert auto_payload["function"] == "loggamma"
          assert gamma_stirling_payload["function"] == "gamma"
          assert rgamma_stirling_payload["function"] == "rgamma"
          assert rgamma_stirling_high_payload["function"] == "rgamma"
          assert erf_result["certified"]
          assert erfc_result["certified"]
          assert erfcinv_result["certified"]
          assert erfcx_result["certified"]
          assert erfi_result["certified"]
          assert erfinv_result["certified"]
          assert dawson_result["certified"]
          assert stirling_result["certified"]
          assert shifted_result["certified"]
          assert auto_payload["certified"]
          assert gamma_stirling_payload["certified"]
          assert rgamma_stirling_payload["certified"]
          assert rgamma_stirling_high_payload["certified"]
          assert stirling_result["method"] == "stirling_loggamma"
          assert shifted_result["method"] == "stirling_shifted_loggamma"
          assert stirling_result["diagnostics"]["certificate_scope"] == "stirling_loggamma_positive_real"
          assert shifted_result["diagnostics"]["certificate_scope"] == "stirling_loggamma_positive_real"
          assert stirling_result["diagnostics"]["selected_method"] == "stirling"
          assert shifted_result["diagnostics"]["selected_method"] == "stirling_shifted"
          assert gamma_stirling_payload["method"] == "stirling_exp_gamma"
          assert gamma_stirling_payload["backend"] == "certsf+python-flint"
          assert gamma_stirling_payload["diagnostics"]["selected_method"] == "stirling_exp"
          assert gamma_stirling_payload["diagnostics"]["certificate_scope"] == "gamma_positive_real_stirling_exp"
          assert gamma_stirling_payload["diagnostics"]["loggamma_method_used"] in {"stirling", "stirling_shifted"}
          for payload in (rgamma_stirling_payload, rgamma_stirling_high_payload):
              assert payload["function"] == "rgamma"
              assert payload["certified"]
              assert payload["method"] == "stirling_recip_rgamma"
              assert payload["backend"] == "certsf+python-flint"
              assert payload["diagnostics"]["selected_method"] == "stirling_recip"
              assert payload["diagnostics"]["certificate_scope"] == "rgamma_positive_real_stirling_recip"
              assert payload["diagnostics"]["certificate_level"] == "custom_asymptotic_bound"
              assert payload["diagnostics"]["audit_status"] == "theorem_documented"
              assert payload["diagnostics"]["loggamma_method_used"] in {"stirling", "stirling_shifted"}
              assert payload["abs_error_bound"] is not None
          assert auto_payload["backend"] != "mpmath"
          assert auto_payload["diagnostics"]["auto_selector"] == "certified_auto"
          assert auto_payload["diagnostics"]["auto_selected_method"] in {"arb", "stirling", "stirling_shifted"}
          assert auto_payload["diagnostics"]["auto_candidates"]
          assert any(
              all(
                  key in candidate
                  for key in ("preselected", "can_certify", "estimated_terms_used")
              )
              for candidate in auto_payload["diagnostics"]["auto_candidates"]
          )
          for key in (
              "shift",
              "shifted_argument",
              "shift_policy",
              "guard_digits",
              "effective_dps",
              "coefficient_source",
              "largest_bernoulli_used",
              "tail_bound",
          ):
              assert key in shifted_result["diagnostics"]
          PY
